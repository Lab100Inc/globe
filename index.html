<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lab 100 Inc. — Global Network</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:           #000000;
  --surface:      rgba(0, 8, 22, 0.97);
  --cyan:         #00c8ff;
  --cyan-dim:     rgba(0, 200, 255, 0.18);
  --cyan-faint:   rgba(0, 200, 255, 0.05);
  --white:        #ffffff;
  --white-60:     rgba(255,255,255,0.6);
  --white-30:     rgba(255,255,255,0.28);
  --white-10:     rgba(255,255,255,0.07);
  --border:       rgba(0, 200, 255, 0.14);
  --border-light: rgba(0, 200, 255, 0.3);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: radial-gradient(ellipse at 50% 52%, #010d1e 0%, #000000 58%);
  color: var(--white-60);
  font-family: 'Inter', system-ui, sans-serif;
  overflow: hidden;
  height: 100vh; width: 100vw;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}
/* perspective moved off body → lives only in ring keyframes to avoid iOS fixed-pos bugs */

canvas {
  display: block;
  position: fixed;
  top: 0; left: 0;
  z-index: 0;
}

/* ── ORBIT RINGS — tilted into 3D orbital planes ── */
.orbit-ring {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 2;
  top: 50%; left: 50%;
  transform-style: preserve-3d;
}
.orbit-ring.r1 {
  width: 630px; height: 630px;
  border: 1px solid rgba(0,200,255,0.09);
  animation: rspin1 80s linear infinite;
}
.orbit-ring.r2 {
  width: 750px; height: 750px;
  border: 1px solid rgba(0,200,255,0.05);
  animation: rspin2 130s linear infinite reverse;
}
.orbit-ring::before {
  content: '';
  position: absolute;
  top: -2px; left: 50%;
  width: 1px; height: 5px;
  background: var(--cyan);
  opacity: 0.55;
}
@keyframes rspin1 {
  from { transform: translate(-50%,-50%) perspective(1100px) rotateX(68deg) rotateZ(0deg); }
  to   { transform: translate(-50%,-50%) perspective(1100px) rotateX(68deg) rotateZ(360deg); }
}
@keyframes rspin2 {
  from { transform: translate(-50%,-50%) perspective(1100px) rotateX(55deg) rotateZ(0deg); }
  to   { transform: translate(-50%,-50%) perspective(1100px) rotateX(55deg) rotateZ(360deg); }
}

/* ── VIGNETTE — depth darkening at screen edges ── */
#vignette {
  position: fixed; inset: 0;
  z-index: 6;
  pointer-events: none;
  background: radial-gradient(ellipse at 50% 50%,
    transparent 28%,
    rgba(0,0,0,0.38) 65%,
    rgba(0,0,0,0.72) 100%
  );
}

/* ── HEADER ── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  padding-left: max(28px, env(safe-area-inset-left) + 16px);
  padding-right: max(28px, env(safe-area-inset-right) + 16px);
}

#logo {
  display: flex;
  align-items: baseline;
  flex-shrink: 0;
  white-space: nowrap;
}
#logo .l1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 3px;
  color: var(--white);
  text-transform: uppercase;
}
#logo .l2 {
  font-size: 13px;
  font-weight: 300;
  letter-spacing: 2px;
  color: var(--white);
  text-transform: uppercase;
  margin-left: 6px;
}

.header-right {
  display: flex;
  align-items: center;
  gap: 22px;
}
.h-stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.h-val {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  color: var(--white);
  line-height: 1;
}
.h-lbl {
  font-size: 7px;
  letter-spacing: 2px;
  color: var(--white-30);
  text-transform: uppercase;
  margin-top: 3px;
}
.h-div {
  width: 1px; height: 22px;
  background: var(--border);
}
.h-status {
  display: flex; align-items: center; gap: 7px;
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--white-30);
  text-transform: uppercase;
}
.h-status::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #00e676;
  box-shadow: 0 0 5px #00e676;
  animation: blink 2.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ── MOBILE HEADER ── */
@media (max-width: 540px) {
  #header { gap: 0; }
  .header-right { gap: 12px; }
  .h-div { display: none; }
  .h-stat-cities { display: none; }
  .h-status { display: none; }
  .h-val { font-size: 11px; }
  .h-lbl { font-size: 6px; letter-spacing: 1px; }
  #logo .l1 { font-size: 13px; letter-spacing: 2px; }
  #logo .l2 { font-size: 11px; letter-spacing: 1.5px; }
}

/* ── FOOTER ── */
#footer {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 38px;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 max(28px, env(safe-area-inset-right) + 16px) 0 max(28px, env(safe-area-inset-left) + 16px);
  pointer-events: none;
}
.f-text {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  color: var(--white-30);
  letter-spacing: 2px;
  text-transform: uppercase;
}

/* ── HINT ── */
#hint {
  position: fixed;
  bottom: 64px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  letter-spacing: 3px;
  color: rgba(0,200,255,0.28);
  text-transform: uppercase;
  pointer-events: none;
  transition: opacity 1.2s;
  white-space: nowrap;
}

/* ── CITY PANEL ── */
#cityPanel {
  position: fixed;
  top: 52px; right: -440px;
  width: 400px;
  height: calc(100vh - 90px);
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 50;
  transition: right 0.45s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto; overflow-x: hidden;
  padding: 26px 26px 40px;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
#cityPanel::-webkit-scrollbar { width: 2px; }
#cityPanel::-webkit-scrollbar-thumb { background: var(--border); }
#cityPanel.open { right: 0; }
#cityPanel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(to right, transparent, var(--cyan), transparent);
  opacity: 0.45;
}

.p-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }

#closePanel {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--white-60);
  width: 28px; height: 28px;
  cursor: pointer; font-size: 11px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-family: inherit;
  flex-shrink: 0;
}
#closePanel:hover { background: var(--white-10); border-color: var(--border-light); color: var(--white); }

.p-node-id {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; letter-spacing: 3px;
  color: rgba(0,200,255,0.55);
  text-transform: uppercase;
  margin-bottom: 7px;
}
#panelCity {
  font-size: 22px; font-weight: 600;
  color: var(--white);
  letter-spacing: 0.5px; line-height: 1.1;
  margin-bottom: 2px;
}
#panelCountry {
  font-size: 11px; font-weight: 400;
  color: var(--white-30);
  letter-spacing: 1px; margin-bottom: 8px;
}
#panelCoords {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: rgba(0,200,255,0.4);
  letter-spacing: 1px;
}

.data-strip {
  display: flex; gap: 10px;
  margin: 16px 0;
}
.d-cell {
  flex: 1;
  background: var(--cyan-faint);
  border: 1px solid var(--border);
  padding: 9px 12px;
}
.d-lbl {
  font-size: 7px; letter-spacing: 2px;
  color: var(--white-30);
  text-transform: uppercase; margin-bottom: 4px;
}
.d-val {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 15px; color: var(--white);
}

.divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}
.s-label {
  font-size: 7px; letter-spacing: 3px;
  color: var(--white-30);
  text-transform: uppercase; margin-bottom: 9px;
}

.tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
.tag {
  border: 1px solid var(--border);
  color: var(--white-60);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7px; letter-spacing: 1.5px;
  padding: 4px 10px; text-transform: uppercase;
  background: var(--cyan-faint);
  transition: all 0.15s;
}
.tag:hover { border-color: var(--border-light); color: var(--white); }

#pOverview {
  font-size: 13px; color: var(--white-60);
  line-height: 1.9; font-weight: 300;
}

.agent-card {
  border: 1px solid var(--border);
  background: var(--cyan-faint);
  padding: 12px 14px;
  margin-bottom: 6px;
  display: flex; gap: 12px; align-items: flex-start;
}
.agent-av {
  width: 30px; height: 30px;
  border: 1px solid var(--border-light);
  background: var(--cyan-dim);
  display: flex; align-items: center; justify-content: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; color: var(--cyan);
  flex-shrink: 0;
}
.a-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px; font-weight: 400;
  color: var(--white); letter-spacing: 1px;
  text-transform: uppercase; margin-bottom: 2px;
}
.a-role {
  font-size: 9px; color: var(--white-30);
  letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 6px;
}
.a-avail {
  display: flex; align-items: center; gap: 5px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; color: #00e676;
  letter-spacing: 1px; text-transform: uppercase;
}
.a-avail::before {
  content: '';
  width: 4px; height: 4px; border-radius: 50%;
  background: #00e676; box-shadow: 0 0 4px #00e676;
}

/* ── TOOLTIP ── */
#tooltip {
  position: fixed; z-index: 40;
  background: rgba(0,0,0,0.9);
  border: 1px solid var(--border-light);
  padding: 6px 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; letter-spacing: 2px;
  color: var(--white); pointer-events: none;
  opacity: 0; transition: opacity 0.1s;
  white-space: nowrap; text-transform: uppercase;
}
.t-sub { color: var(--white-30); font-size: 8px; letter-spacing: 1px; margin-top: 2px; }
#tooltip.show { opacity: 1; }

body.pin-hover { cursor: crosshair; }

/* ── BOOT OVERLAY ── */
#bootOverlay {
  position: fixed; inset: 0;
  background: #000;
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 20px;
  pointer-events: none;
  transition: opacity 0.9s ease;
}
#bootOverlay.fade-out { opacity: 0; }
.boot-logo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 26px; font-weight: 400;
  color: #fff; letter-spacing: 8px;
  text-transform: uppercase;
  opacity: 0; animation: bootFadeIn 0.5s 0.3s forwards;
}
.boot-sub {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; letter-spacing: 4px;
  color: rgba(0,200,255,0.5);
  text-transform: uppercase;
  opacity: 0; animation: bootFadeIn 0.5s 0.7s forwards;
}
.boot-bar {
  width: 180px; height: 1px;
  background: rgba(0,200,255,0.15);
  position: relative; overflow: hidden;
  opacity: 0; animation: bootFadeIn 0.3s 0.5s forwards;
}
.boot-bar::after {
  content: '';
  position: absolute; top: 0; left: 0;
  height: 100%; width: 0;
  background: var(--cyan);
  box-shadow: 0 0 10px var(--cyan);
  animation: bootBar 1.5s 0.6s cubic-bezier(0.4,0,0.2,1) forwards;
}
@keyframes bootFadeIn { to { opacity: 1; } }
@keyframes bootBar    { to { width: 100%; } }

/* ── HUD CORNER BRACKETS ── */
.hud-corner {
  position: fixed;
  width: 52px; height: 52px;
  pointer-events: none;
  z-index: 18;
  opacity: 0;
  animation: hudFadeIn 1.2s 2.8s ease forwards;
}
@keyframes hudFadeIn { to { opacity: 1; } }
.hud-corner.tl { top: 60px; left: 10px;  border-top:    2px solid rgba(0,200,255,0.58); border-left:   2px solid rgba(0,200,255,0.58); }
.hud-corner.tr { top: 60px; right: 10px; border-top:    2px solid rgba(0,200,255,0.58); border-right:  2px solid rgba(0,200,255,0.58); }
.hud-corner.bl { bottom: 68px; left: 10px;  border-bottom: 2px solid rgba(0,200,255,0.58); border-left:   2px solid rgba(0,200,255,0.58); }
.hud-corner.br { bottom: 68px; right: 10px; border-bottom: 2px solid rgba(0,200,255,0.58); border-right:  2px solid rgba(0,200,255,0.58); }

/* ── TARGETING RETICLE ── */
#reticle {
  position: fixed;
  width: 40px; height: 40px;
  pointer-events: none;
  z-index: 12;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.18s ease, width 0.2s ease, height 0.2s ease;
}
#reticle.show { opacity: 1; animation: reticlePulse 2s ease-in-out infinite; }
#reticle.selected {
  width: 52px; height: 52px;
  opacity: 1;
  animation: reticleSelected 2.2s ease-in-out infinite;
}
@keyframes reticlePulse {
  0%, 100% { transform: translate(-50%,-50%) scale(1); }
  50%       { transform: translate(-50%,-50%) scale(1.07); }
}
@keyframes reticleSelected {
  0%, 100% { transform: translate(-50%,-50%) scale(1); }
  50%       { transform: translate(-50%,-50%) scale(1.05); }
}
.rt { position: absolute; width: 12px; height: 12px; }
.rt.tl { top:0; left:0; border-top: 1.5px solid var(--cyan); border-left: 1.5px solid var(--cyan); }
.rt.tr { top:0; right:0; border-top: 1.5px solid var(--cyan); border-right: 1.5px solid var(--cyan); }
.rt.bl { bottom:0; left:0; border-bottom: 1.5px solid var(--cyan); border-left: 1.5px solid var(--cyan); }
.rt.br { bottom:0; right:0; border-bottom: 1.5px solid var(--cyan); border-right: 1.5px solid var(--cyan); }
#reticle::after {
  content: '';
  position: absolute; top: 50%; left: 50%;
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--cyan);
  transform: translate(-50%,-50%);
  opacity: 0.75;
  box-shadow: 0 0 5px var(--cyan);
}
#reticleLabel {
  position: absolute;
  top: calc(100% + 7px);
  left: 50%;
  transform: translateX(-50%);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 7px;
  letter-spacing: 2.5px;
  color: var(--cyan);
  white-space: nowrap;
  text-transform: uppercase;
  opacity: 0;
  transition: opacity 0.3s ease;
}
#reticle.selected #reticleLabel { opacity: 0.8; }

/* ── DATA TICKER ── */
#ticker {
  position: fixed;
  bottom: 38px; left: 0; right: 0;
  height: 20px;
  z-index: 19;
  overflow: hidden;
  border-top: 1px solid rgba(0,200,255,0.10);
  background: rgba(0,0,5,0.45);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  display: flex; align-items: center;
  opacity: 0;
  animation: hudFadeIn 0.8s 3.2s ease forwards;
}
#tickerTrack {
  white-space: nowrap;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px;
  letter-spacing: 2.5px;
  color: rgba(0,200,255,0.30);
  text-transform: uppercase;
  animation: tickerScroll 100s linear infinite;
  will-change: transform;
}
@keyframes tickerScroll {
  from { transform: translateX(0); }
  to   { transform: translateX(-50%); }
}
@media (max-width: 640px) {
  /* Ticker + HUD corners hidden on mobile */
  #ticker { display: none; }
  .hud-corner { display: none; }

  /* Hint — allow wrap, lift above footer */
  #hint {
    bottom: 54px;
    font-size: 7px;
    letter-spacing: 2px;
    white-space: normal;
    text-align: center;
    width: 72%;
  }

  /* Panel — full width, slides from right, proper safe-area padding */
  #cityPanel {
    width: 100%;
    right: -100%;
    top: 52px;
    height: calc(100vh - 52px);
    height: calc(100dvh - 52px);
    border-left: none;
    border-top: 1px solid var(--border);
    padding: 20px max(20px, env(safe-area-inset-right) + 14px) 80px max(20px, env(safe-area-inset-left) + 14px);
    padding-bottom: max(80px, env(safe-area-inset-bottom) + 60px);
    -webkit-overflow-scrolling: touch;
  }
  #cityPanel.open { right: 0; }

  /* Close button — 44px minimum tap target */
  #closePanel { width: 44px; height: 44px; font-size: 14px; }

  /* Orbit rings — scale down to not dominate small screens */
  .orbit-ring.r1 { width: 440px; height: 440px; }
  .orbit-ring.r2 { width: 520px; height: 520px; }
}

/* ── HEX OVERLAY ── */
#hexCanvas {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 1;
  opacity: 0.045;
}
</style>
</head>
<body>

<!-- Boot Overlay -->
<div id="bootOverlay">
  <div class="boot-logo">Lab 100</div>
  <div class="boot-bar"></div>
  <div class="boot-sub">Initializing Network</div>
</div>

<div class="orbit-ring r1"></div>
<div class="orbit-ring r2"></div>

<!-- Vignette depth overlay -->
<div id="vignette"></div>

<!-- HUD Corners -->
<div class="hud-corner tl"></div>
<div class="hud-corner tr"></div>
<div class="hud-corner bl"></div>
<div class="hud-corner br"></div>

<!-- Targeting Reticle -->
<div id="reticle">
  <span class="rt tl"></span>
  <span class="rt tr"></span>
  <span class="rt bl"></span>
  <span class="rt br"></span>
  <div id="reticleLabel"></div>
</div>

<!-- Hex Grid Overlay -->
<canvas id="hexCanvas"></canvas>

<!-- Header -->
<div id="header">
  <div id="logo">
    <span class="l1">Lab 100</span>
    <span class="l2">Inc.</span>
  </div>
  <div class="header-right">
    <div class="h-stat h-stat-cities">
      <div class="h-val">100</div>
      <div class="h-lbl">Cities</div>
    </div>
    <div class="h-div h-stat-cities"></div>
    <div class="h-stat">
      <div class="h-val" id="hLat" style="font-size:11px;letter-spacing:1px;">—</div>
      <div class="h-lbl">Latitude</div>
    </div>
    <div class="h-div"></div>
    <div class="h-stat">
      <div class="h-val" id="hLon" style="font-size:11px;letter-spacing:1px;">—</div>
      <div class="h-lbl">Longitude</div>
    </div>
    <div class="h-div"></div>
    <div class="h-stat">
      <div class="h-val" id="hTime">—</div>
      <div class="h-lbl">UTC</div>
    </div>
    <div class="h-div"></div>
    <div class="h-status">Network Active</div>
  </div>
</div>

<!-- Footer -->
<div id="footer">
  <span class="f-text">© 2026 Lab 100 Inc.</span>
  <span class="f-text" id="fCoords">Drag to Explore · Scroll to Zoom</span>
</div>

<!-- Data Ticker -->
<div id="ticker"><span id="tickerTrack"></span></div>

<div id="hint">Select a node to open city dossier</div>

<!-- City Panel -->
<div id="cityPanel">
  <div class="p-header">
    <div>
      <div class="p-node-id" id="panelId">// NODE</div>
      <div id="panelCity">—</div>
      <div id="panelCountry">—</div>
      <div id="panelContinent" style="font-size:10px;letter-spacing:1.5px;color:var(--cyan);opacity:0.7;margin-bottom:4px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;">—</div>
      <div id="panelCoords">—</div>
    </div>
    <button id="closePanel" onclick="closePanel()">✕</button>
  </div>

  <div class="data-strip">
    <div class="d-cell">
      <div class="d-lbl">Representatives</div>
      <div class="d-val" id="pAgentN">—</div>
    </div>
    <div class="d-cell">
      <div class="d-lbl">Sectors</div>
      <div class="d-val" id="pIndN">—</div>
    </div>
    <div class="d-cell">
      <div class="d-lbl">Local Time</div>
      <div class="d-val" id="pLocalTime" style="font-size:13px;letter-spacing:1px;">—</div>
    </div>
  </div>

  <div class="divider"></div>
  <div class="s-label">Sector Coverage</div>
  <div class="tag-row" id="pIndustries"></div>

// ── Lat / Lon grid ──
function buildGrid() {
  const SEG = 120;
  function lm(opacity) {
    return new THREE.LineBasicMaterial({ color:0x00c8ff, transparent:true, opacity });
  }
  for (let lat = -75; lat <= 75; lat += 15) {
    if (Math.abs(lat) === 75) continue; // skip near-pole circles — too small, clutters poles
    const r = GLOBE_R * Math.cos(lat * Math.PI/180) + 0.002;
    const y = GLOBE_R * Math.sin(lat * Math.PI/180);
    const pts = [];
    for (let i = 0; i <= SEG; i++) {
      const a = i/SEG * Math.PI*2;
      pts.push(new THREE.Vector3(r*Math.cos(a), y, r*Math.sin(a)));
    }
    const op = lat === 0 ? 0.25 : 0.06;
    G.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lm(op)));
  }
  for (let lon = 0; lon < 360; lon += 15) {
    const t = lon * Math.PI/180;
    const pts = [];
    for (let i = 0; i <= SEG; i++) {
      const p = i/SEG * Math.PI*2;
      pts.push(new THREE.Vector3(
        GLOBE_R*Math.sin(p)*Math.cos(t)+0.002,
        GLOBE_R*Math.cos(p),
        GLOBE_R*Math.sin(p)*Math.sin(t)
      ));
    }
    const op = (lon===0||lon===180) ? 0.25 : 0.06;
    G.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lm(op)));
  }
}
buildGrid();

// ── Country outlines ──
function latLonToVec3(lat, lon, r) {
  const phi   = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
    r * Math.cos(phi),
    r * Math.sin(phi) * Math.sin(theta)
  );
}

// ── Globe map texture ──
// Paints ocean / land / borders / coastlines onto a canvas,
// then wraps it onto the sphere as an equirectangular texture.
async function buildGlobeTexture() {
  const world = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json').then(r => r.json());

  const W = 4096, H = 2048;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // Equirectangular projection helper
  function xy(lon, lat) {
    return [(lon + 180) / 360 * W, (90 - lat) / 180 * H];
  }

  // Draw a GeoJSON polygon ring set as a path
  function tracePoly(rings) {
    ctx.beginPath();
    rings.forEach(ring => {
      ring.forEach(([lon, lat], i) => {
        const [x, y] = xy(lon, lat);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.closePath();
    });
  }

  // Draw a mesh line set (MultiLineString coordinates)
  function traceLines(coordinates) {
    coordinates.forEach(line => {
      if (line.length < 2) return;
      ctx.beginPath();
      line.forEach(([lon, lat], i) => {
        const [x, y] = xy(lon, lat);
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();
    });
  }

  // 1 — Ocean (near black with a hint of deep blue)
  ctx.fillStyle = '#000911';
  ctx.fillRect(0, 0, W, H);

  // 2 — Land fill (dark charcoal-navy — clearly visible against ocean)
  const countries = topojson.feature(world, world.objects.countries);
  ctx.fillStyle = '#0c2237';
  countries.features.forEach(f => {
    if (!f.geometry) return;
    const polys = f.geometry.type === 'Polygon'
      ? [f.geometry.coordinates]
      : f.geometry.coordinates;
    polys.forEach(poly => { tracePoly(poly); ctx.fill('evenodd'); });
  });

  // 3 — Internal country borders (subtle, dim blue-white)
  const inner = topojson.mesh(world, world.objects.countries, (a, b) => a !== b);
  ctx.strokeStyle = 'rgba(80, 160, 200, 0.55)';
  ctx.lineWidth = 1.2;
  traceLines(inner.coordinates);

  // 4 — Coastlines: wide cyan glow pass first, then crisp bright line on top
  const outer = topojson.mesh(world, world.objects.countries, (a, b) => a === b);

  // Glow halo
  ctx.strokeStyle = 'rgba(0, 200, 255, 0.15)';
  ctx.lineWidth = 8;
  traceLines(outer.coordinates);

  // Mid glow
  ctx.strokeStyle = 'rgba(0, 200, 255, 0.35)';
  ctx.lineWidth = 4;
  traceLines(outer.coordinates);

  // Crisp edge
  ctx.strokeStyle = 'rgba(0, 220, 255, 0.95)';
  ctx.lineWidth = 1.8;
  traceLines(outer.coordinates);

  // 5 — Time zone bands (every 15° lon) + UTC offset labels
  ctx.setLineDash([6, 14]);
  ctx.strokeStyle = 'rgba(0, 180, 240, 0.32)';
  ctx.lineWidth = 1.5;
  for (let tlon = -165; tlon <= 180; tlon += 15) {
    const tx = (tlon + 180) / 360 * W;
    ctx.beginPath(); ctx.moveTo(tx, 0); ctx.lineTo(tx, H); ctx.stroke();
  }
  ctx.setLineDash([]);

  // ── Timezone band — clean uniform map legend at top of globe ──
  const TZ = [
    { off:-12, abbr:'BIT'  }, { off:-11, abbr:'NUT'  }, { off:-10, abbr:'HST'  },
    { off: -9, abbr:'AKT'  }, { off: -8, abbr:'PST'  }, { off: -7, abbr:'MST'  },
    { off: -6, abbr:'CST'  }, { off: -5, abbr:'EST'  }, { off: -4, abbr:'AST'  },
    { off: -3, abbr:'BRT'  }, { off: -2, abbr:'FNT'  }, { off: -1, abbr:'CVT'  },
    { off:  0, abbr:'UTC'  }, { off: +1, abbr:'CET'  }, { off: +2, abbr:'EET'  },
    { off: +3, abbr:'MSK'  }, { off: +4, abbr:'GST'  }, { off: +5, abbr:'PKT'  },
    { off: +6, abbr:'BST'  }, { off: +7, abbr:'ICT'  }, { off: +8, abbr:'CST'  },
    { off: +9, abbr:'JST'  }, { off:+10, abbr:'AEST' }, { off:+11, abbr:'SBT'  },
    { off:+12, abbr:'NZST' },
  ];

  // Band background
  const bTop = (90 - 80) / 180 * H;
  const bBot = (90 - 62) / 180 * H;
  ctx.fillStyle = 'rgba(0, 50, 100, 0.09)';
  ctx.fillRect(0, bTop, W, bBot - bTop);

  // Top and bottom border lines
  ctx.setLineDash([]);
  ctx.lineWidth = 1;
  ctx.strokeStyle = 'rgba(0, 200, 255, 0.22)';
  [bTop, bBot].forEach(y => {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  });

  // Vertical dividers at each zone boundary
  for (let i = 0; i <= 24; i++) {
    const lon = -180 + i * 15;
    const tx  = (lon + 180) / 360 * W;
    ctx.strokeStyle = 'rgba(0, 180, 240, 0.20)';
    ctx.lineWidth   = 0.8;
    ctx.beginPath(); ctx.moveTo(tx, bTop); ctx.lineTo(tx, bBot); ctx.stroke();
  }

  // Labels — uniform two lines per zone: abbreviation + offset
  const rowAbbr = bTop + (bBot - bTop) * 0.36;  // upper line: abbreviation
  const rowOff  = bTop + (bBot - bTop) * 0.72;  // lower line: UTC offset
  const fAbbr   = Math.round(W / 122);
  const fOff    = Math.round(W / 140);
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  TZ.forEach(({ off, abbr }) => {
    const cx = (off * 15 + 7.5 + 180) / 360 * W;
    // Abbreviation
    ctx.font      = `bold ${fAbbr}px "IBM Plex Mono", monospace`;
    ctx.fillStyle = off === 0 ? 'rgba(0, 240, 255, 1.0)' : 'rgba(180, 230, 255, 0.75)';
    ctx.fillText(abbr, cx, rowAbbr);
    // Offset number
    const offLabel = off === 0 ? '±0' : off > 0 ? `+${off}` : `${off}`;
    ctx.font      = `${fOff}px "IBM Plex Mono", monospace`;
    ctx.fillStyle = off === 0 ? 'rgba(0, 220, 255, 0.85)' : 'rgba(130, 200, 240, 0.55)';
    ctx.fillText(offLabel, cx, rowOff);
  });

  // South mirror — every 3rd zone, subtle
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const lblYS  = (90 + 62) / 180 * H;
  const fSizeS = Math.round(W / 120);
  ctx.font = `${fSizeS}px "IBM Plex Mono", monospace`;
  for (let tz = -12; tz <= 12; tz += 3) {
    const tx    = (tz * 15 + 7.5 + 180) / 360 * W;
    const label = tz === 0 ? 'UTC' : tz > 0 ? `+${tz}` : `${tz}`;
    ctx.fillStyle = 'rgba(0, 190, 240, 0.32)';
    ctx.fillText(label, tx, lblYS);
  }

  // 6 — Hex grid baked into globe texture
  (function drawGlobeHex() {
    const S = 82; // circumradius in texture pixels (flat-top)
    const colW = S * 1.5;
    const rowH = S * Math.sqrt(3);
    const cols = Math.ceil(W / colW) + 3;
    const rows = Math.ceil(H / rowH) + 3;
    ctx.strokeStyle = 'rgba(0, 200, 255, 0.055)';
    ctx.lineWidth = 1.1;
    for (let col = -1; col < cols; col++) {
      for (let row = -1; row < rows; row++) {
        const cx = col * colW;
        const cy = row * rowH + (col % 2 !== 0 ? rowH / 2 : 0);
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI / 3) * i;
          const x = cx + S * Math.cos(angle);
          const y = cy + S * Math.sin(angle);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
  })();

  // 7 — Apply to globe
  const tex = new THREE.CanvasTexture(c);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  globeMat.map = tex;
  globeMat.color.setHex(0xffffff);
  globeMat.needsUpdate = true;
}
buildGlobeTexture().catch(e => console.warn('Globe map failed:', e));

// ═══════════════════════════════════════════════════
//  CONNECTION ARCS
// ═══════════════════════════════════════════════════
const arcGroup = new THREE.Group();
G.add(arcGroup); // rotates with globe so arcs stay pinned to cities
const activeArcs = [];

const ARC_PTS = 64;
function makeArc(iA, iB) {
  const cA = CITIES[iA], cB = CITIES[iB];
  const posA = latLonToVec3(cA.lat, cA.lon, GLOBE_R + 0.06);
  const posB = latLonToVec3(cB.lat, cB.lon, GLOBE_R + 0.06);
  const mid  = posA.clone().add(posB).multiplyScalar(0.5);
  mid.normalize().multiplyScalar(GLOBE_R + Math.max(0.9, posA.distanceTo(posB) * 0.38));
  const curve = new THREE.QuadraticBezierCurve3(posA, mid, posB);
  const geo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(ARC_PTS));
  geo.setDrawRange(0, 0); // starts invisible — drawn progressively
  const lineMesh = new THREE.Line(geo,
    new THREE.LineBasicMaterial({ color:0x00c8ff, transparent:true, opacity:0.18 })
  );
  arcGroup.add(lineMesh);
  const dot = new THREE.Mesh(
    new THREE.SphereGeometry(0.028, 6, 6),
    new THREE.MeshBasicMaterial({ color:0x00ffff, transparent:true, opacity:0.0 })
  );
  arcGroup.add(dot);
  const trail = new THREE.Mesh(
    new THREE.SphereGeometry(0.016, 5, 5),
    new THREE.MeshBasicMaterial({ color:0x00c8ff, transparent:true, opacity:0.0 })
  );
  arcGroup.add(trail);
  return { curve, lineMesh, dot, trail,
    drawProgress: 0, progress: 0, speed: 0.0018 + Math.random()*0.0022 };
}

function refreshArcs(focusIdx) {
  activeArcs.forEach(a => {
    arcGroup.remove(a.lineMesh); arcGroup.remove(a.dot); arcGroup.remove(a.trail);
    a.lineMesh.geometry.dispose(); a.lineMesh.material.dispose();
    a.dot.geometry.dispose(); a.dot.material.dispose();
    a.trail.geometry.dispose(); a.trail.material.dispose();
  });
  activeArcs.length = 0;
  if (focusIdx < 0) return; // idle: no arcs — only appear on city click
  const pool = [...Array(CITIES.length).keys()].filter(i => i !== focusIdx);
  for (let k = 0; k < 6 && pool.length; k++) {
    activeArcs.push(makeArc(focusIdx, pool.splice(Math.floor(Math.random()*pool.length), 1)[0]));
  }
}

// ── City scan rings — burst from clicked pin, then arcs draw ──
const cityRings = []; // expanding shockwave rings

function triggerCityScan(cityIdx) {
  const c   = CITIES[cityIdx];
  const pos = latLonToVec3(c.lat, c.lon, GLOBE_R + 0.08);
  const dir = pos.clone().normalize();
  // Create 3 expanding rings with staggered delays
  for (let k = 0; k < 3; k++) {
    const mat  = new THREE.MeshBasicMaterial({ color:0x00c8ff, transparent:true, opacity:0.0, side:THREE.DoubleSide });
    const mesh = new THREE.Mesh(new THREE.RingGeometry(0.05, 0.09, 48), mat);
    mesh.position.copy(pos);
    mesh.lookAt(pos.clone().add(dir));
    G.add(mesh);
    cityRings.push({ mesh, age: 0, delay: k * 0.18, alive: true });
  }
  // After rings start, draw arcs
  setTimeout(() => refreshArcs(cityIdx), 420);
}

let _twTimer = null;
function typewriter(el, text, speed = 16) {
  if (_twTimer) { clearInterval(_twTimer); _twTimer = null; }
  el.textContent = '';
  let i = 0;
  _twTimer = setInterval(() => {
    el.textContent += text[i++];
    if (i >= text.length) { clearInterval(_twTimer); _twTimer = null; }
  }, speed);
}

// ═══════════════════════════════════════════════════
//  GLITCH (lat/lon header)
// ═══════════════════════════════════════════════════
const _GCHARS = '0123456789';
let _glitching = false;
let _latReal = '—', _lonReal = '—';

function glitchLatLon() {
  if (_glitching) return;
  _glitching = true;
  const latEl = document.getElementById('hLat');
  const lonEl = document.getElementById('hLon');
  let step = 0;
  const iv = setInterval(() => {
    step++;
    if (step >= 5) {
      latEl.textContent = _latReal; lonEl.textContent = _lonReal;
      _glitching = false; clearInterval(iv); return;
    }
    const sc = s => s.split('').map(c => /\d/.test(c) && Math.random()<0.55
      ? _GCHARS[Math.floor(Math.random()*10)] : c).join('');
    latEl.textContent = sc(_latReal); lonEl.textContent = sc(_lonReal);
  }, 45);
}

// ── Lat/lon from globe surface ──
function vec3ToLatLon(localNorm) {
  const lat = Math.asin(Math.max(-1, Math.min(1, localNorm.y))) * 180 / Math.PI;
  let theta = Math.atan2(localNorm.z, -localNorm.x);
  if (theta < 0) theta += 2 * Math.PI;
  const lon = theta * 180 / Math.PI - 180;
  return { lat, lon };
}

function fmtCoords(lat, lon) {
  const la = lat >= 0 ? `${lat.toFixed(2)}° N` : `${Math.abs(lat).toFixed(2)}° S`;
  const lo = lon >= 0 ? `${lon.toFixed(2)}° E` : `${Math.abs(lon).toFixed(2)}° W`;
  const utcOff = Math.round(lon / 15);
  const offStr = utcOff >= 0 ? `UTC+${utcOff}` : `UTC${utcOff}`;
  const localMs  = Date.now() + utcOff * 3600000;
  const localDate = new Date(localMs);
  const hh = String(localDate.getUTCHours()).padStart(2,'0');
  const mm = String(localDate.getUTCMinutes()).padStart(2,'0');
  return `${la}  ·  ${lo}  ·  ${offStr}  ·  ${hh}:${mm}`;
}

// ═══════════════════════════════════════════════════
//  ROTATION — Drag with momentum + auto-rotate
// ═══════════════════════════════════════════════════
let isDragging = false;
let velX = 0, velY = 0;
let prevMX = 0, prevMY = 0;
let lastDX = 0, lastDY = 0;
const SENS     = 0.007;
const DECAY    = 0.93;
const AUTO_SPD = 0.0010;
const RESUME   = 0.00015;

const raycaster  = new THREE.Raycaster();
const mouse       = new THREE.Vector2();
const tooltip     = document.getElementById('tooltip');
const panel       = document.getElementById('cityPanel');
const reticleEl   = document.getElementById('reticle');
let   hoverIdx    = -1; // currently hovered city index (for render-loop reticle update)
const _rVec       = new THREE.Vector3(); // reusable for reticle projection

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  prevMX = e.clientX; prevMY = e.clientY;
  lastDX = lastDY = 0;
  canvas.style.cursor = 'grabbing';
});

window.addEventListener('mousemove', e => {
  if (isDragging) {
    lastDX = e.clientX - prevMX;
    lastDY = e.clientY - prevMY;
    G.rotation.y += lastDX * SENS;
    G.rotation.x += lastDY * SENS;
    G.rotation.x = Math.max(-Math.PI/2.8, Math.min(Math.PI/2.8, G.rotation.x));
    prevMX = e.clientX; prevMY = e.clientY;
    tooltip.classList.remove('show');
    return;
  }

  mouse.x = (e.clientX / window.innerWidth)  *  2 - 1;
  mouse.y = (e.clientY / window.innerHeight) * -2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Pin hover — use large invisible hit spheres
  const hits = raycaster.intersectObjects(hitMeshes);
  if (hits.length) {
    const ci = hits[0].object.userData.cityIdx;
    const c = CITIES[ci];
    document.getElementById('tCity').textContent    = c.name;
    document.getElementById('tCountry').textContent = c.country;
    tooltip.style.left = (e.clientX + 16) + 'px';
    tooltip.style.top  = (e.clientY - 4) + 'px';
    tooltip.classList.add('show');
    document.body.classList.add('pin-hover');
    pinMeshes.forEach((p, i) => {
      p.material.emissiveIntensity = i === ci ? 2.2 : 0.5;
    });
    document.getElementById('fCoords').textContent = `${c.name} · ${c.country}`;
    hoverIdx = ci;
  } else {
    tooltip.classList.remove('show');
    document.body.classList.remove('pin-hover');
    hoverIdx = -1;
    pinMeshes.forEach((p,i) => {
      p.material.emissiveIntensity = i === selIdx ? 2.5 : 0.85;
    });

    // Globe surface lat/lon + timezone
    const gHits = raycaster.intersectObject(globeMesh);
    if (gHits.length) {
      const localPt = G.worldToLocal(gHits[0].point.clone()).normalize();
      const { lat, lon } = vec3ToLatLon(localPt);
      document.getElementById('fCoords').textContent = fmtCoords(lat, lon);
    } else {
      document.getElementById('fCoords').textContent = 'Drag · Scroll to Zoom';
    }
  }
});

window.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  canvas.style.cursor = '';
  velX = lastDY * SENS;
  velY = lastDX * SENS;
  glitchLatLon();
});

canvas.addEventListener('mouseleave', () => { tooltip.classList.remove('show'); });

canvas.addEventListener('click', e => {
  // Suppress click if significant drag happened
  if (Math.abs(lastDX) > 4 || Math.abs(lastDY) > 4) return;
  mouse.x = (e.clientX / window.innerWidth)  *  2 - 1;
  mouse.y = (e.clientY / window.innerHeight) * -2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(hitMeshes);
  if (hits.length) openPanel(hits[0].object.userData.cityIdx);
});

canvas.addEventListener('wheel', e => {
  camera.position.z = Math.max(8.5, Math.min(24, camera.position.z + e.deltaY * 0.013));
  e.preventDefault();
}, { passive: false });

// Touch
let tPrev = null, tLastDX = 0, tLastDY = 0;
let tPinchDist = null; // for pinch-to-zoom
let tTapStart = null;  // for tap detection

function getTouchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    tPrev = { x:e.touches[0].clientX, y:e.touches[0].clientY };
    tTapStart = { x:e.touches[0].clientX, y:e.touches[0].clientY, t:Date.now() };
    isDragging = true; tLastDX = tLastDY = 0;
    tPinchDist = null;
  } else if (e.touches.length === 2) {
    tPinchDist = getTouchDist(e);
    isDragging = false;
  }
  e.preventDefault();
}, { passive:false });

canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && tPinchDist !== null) {
    // Pinch-to-zoom
    const newDist = getTouchDist(e);
    const delta = tPinchDist - newDist;
    camera.position.z = Math.max(8.5, Math.min(24, camera.position.z + delta * 0.04));
    tPinchDist = newDist;
    tTapStart = null;
  } else if (e.touches.length === 1 && isDragging && tPrev) {
    tLastDX = e.touches[0].clientX - tPrev.x;
    tLastDY = e.touches[0].clientY - tPrev.y;
    G.rotation.y += tLastDX * SENS;
    G.rotation.x += tLastDY * SENS;
    G.rotation.x = Math.max(-Math.PI/2.8, Math.min(Math.PI/2.8, G.rotation.x));
    tPrev = { x:e.touches[0].clientX, y:e.touches[0].clientY };
    // Cancel tap if moved too much
    if (tTapStart && (Math.abs(tLastDX) > 6 || Math.abs(tLastDY) > 6)) tTapStart = null;
  }
  e.preventDefault();
}, { passive:false });

canvas.addEventListener('touchend', e => {
  isDragging = false;
  velX = tLastDY * SENS; velY = tLastDX * SENS;
  tPinchDist = null;
  glitchLatLon();

  // Tap detection — quick touch with minimal movement = try to open a city
  if (tTapStart && (Date.now() - tTapStart.t) < 300) {
    const tx = tTapStart.x, ty = tTapStart.y;
    mouse.x = (tx / window.innerWidth)  *  2 - 1;
    mouse.y = (ty / window.innerHeight) * -2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(hitMeshes);
    if (hits.length) openPanel(hits[0].object.userData.cityIdx);
  }
  tTapStart = null;
});

// ── Panel ──
let selIdx = -1;
let hintDone = false;
let localClockTimer = null;

function fmtTzLabel(off) {
  const sign  = off >= 0 ? '+' : '-';
  const abs   = Math.abs(off);
  const hrs   = Math.floor(abs);
  const mins  = Math.round((abs - hrs) * 60);
  return mins > 0 ? `UTC${sign}${hrs}:${String(mins).padStart(2,'0')}` : `UTC${sign}${hrs}`;
}

function startLocalClock(city) {
  const utcOff = (city.name in CITY_TZ) ? CITY_TZ[city.name] : Math.round(city.lon / 15);
  function tick() {
    const now  = new Date(Date.now() + utcOff * 3600000);
    const hh   = String(now.getUTCHours()).padStart(2,'0');
    const mm   = String(now.getUTCMinutes()).padStart(2,'0');
    const ss   = String(now.getUTCSeconds()).padStart(2,'0');
    document.getElementById('pLocalTime').textContent = `${hh}:${mm}:${ss}`;
  }
  // Also show timezone label in coords line
  document.getElementById('panelCoords').textContent =
    formatCoords(city.lat, city.lon) + '   ' + fmtTzLabel(utcOff);
  tick();
  if (localClockTimer) clearInterval(localClockTimer);
  localClockTimer = setInterval(tick, 1000);
}

function openPanel(idx) {
  // Reset previous selected pin
  if (selIdx >= 0 && selIdx < pinMeshes.length) {
    pinMeshes[selIdx].scale.setScalar(1);
  }

  selIdx = idx;
  const c = CITIES[idx];
  const id = `NODE-${String(idx+1).padStart(3,'0')}`;

  document.getElementById('panelId').textContent        = `// ${id}`;
  document.getElementById('panelCity').textContent      = c.name;
  document.getElementById('panelCountry').textContent   = c.country;
  document.getElementById('panelContinent').textContent = CONTINENT[c.name] || '—';
  document.getElementById('panelCoords').textContent    = formatCoords(c.lat, c.lon);
  document.getElementById('pAgentN').textContent        = c.agents.length;
  document.getElementById('pIndN').textContent          = c.industries.length;
  startLocalClock(c);
  document.getElementById('pIndustries').innerHTML = c.industries.map(i => `<span class="tag">${i}</span>`).join('');
  typewriter(document.getElementById('pOverview'), c.overview);
  document.getElementById('pAgents').innerHTML        = c.agents.map(a => `
    <div class="agent-card">
      <div class="agent-av">${initials(a.n)}</div>
      <div>
        <div class="a-name">${a.n}</div>
        <div class="a-role">${a.r}</div>
        <div class="a-avail">Available</div>
      </div>
    </div>`).join('');

  panel.classList.add('open');
  triggerCityScan(idx);

  if (!hintDone) {
    document.getElementById('hint').style.opacity = '0';
    hintDone = true;
  }

  pinMeshes.forEach((p, i) => {
    p.material.color.setHex(i === idx ? 0x00c8ff : 0xffffff);
    p.material.emissiveIntensity = i === idx ? 2.5 : 0.85;
  });
}

function closePanel() {
  if (selIdx >= 0 && selIdx < pinMeshes.length) {
    pinMeshes[selIdx].scale.setScalar(1);
  }
  if (localClockTimer) { clearInterval(localClockTimer); localClockTimer = null; }
  panel.classList.remove('open');
  selIdx = -1;
  pinMeshes.forEach(p => { p.material.color.setHex(0xffffff); p.material.emissiveIntensity = 0.85; });
  refreshArcs(-1);
}
window.closePanel = closePanel;

function formatCoords(lat, lon) {
  const la = lat > 0 ? `${lat.toFixed(2)}° N` : `${Math.abs(lat).toFixed(2)}° S`;
  const lo = lon > 0 ? `${lon.toFixed(2)}° E` : `${Math.abs(lon).toFixed(2)}° W`;
  return `${la}  ·  ${lo}`;
}
function initials(name) {
  const parts = name.trim().split(/[\s.]+/).filter(Boolean);
  return parts.slice(0,2).map(p => p[0]).join('');
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  // Enforce mobile zoom — e.g. when rotating phone
  if (window.innerWidth < 640 && camera.position.z < 20) camera.position.z = 22;
  // Enforce desktop zoom when expanding back
  if (window.innerWidth >= 640 && camera.position.z > 18) camera.position.z = 16;
});

// ── Clock ──
function tick() {
  const u = new Date().toUTCString().match(/(\d{2}:\d{2}:\d{2})/);
  if (u) document.getElementById('hTime').textContent = u[1];
}
setInterval(tick, 1000); tick();

// ── Data Ticker ──
(function initTicker() {
  const pairs = [
    ['NEW YORK','LONDON'],['TOKYO','SINGAPORE'],['DUBAI','FRANKFURT'],
    ['HONG KONG','SYDNEY'],['SAO PAULO','MIAMI'],['PARIS','MILAN'],
    ['TORONTO','CHICAGO'],['MUMBAI','ZURICH'],['SEOUL','BEIJING'],
    ['AMSTERDAM','STOCKHOLM'],['NAIROBI','CAIRO'],['MEXICO CITY','BOGOTA'],
    ['LOS ANGELES','SHANGHAI'],['JOHANNESBURG','LAGOS'],['ISTANBUL','MOSCOW'],
  ];
  const statuses = [
    'DEAL FLOW: ACTIVE','CHANNEL: SECURE','NODE: ONLINE',
    'LINK: ESTABLISHED','INTEL: LIVE','NETWORK: NOMINAL',
  ];
  const segments = [];
  pairs.forEach(([a, b], i) => {
    segments.push(`NODE-${String(i*3+1).padStart(3,'0')} ${a} ⟶ ${b}`);
    segments.push(statuses[i % statuses.length]);
    segments.push(`SECTOR-${String(i+1).padStart(2,'0')}`);
  });
  const raw = segments.join('  ·  ');
  // Double the content so the loop is seamless
  const track = document.getElementById('tickerTrack');
  track.textContent = raw + '  ·  ' + raw;
})();

// ── Hex Overlay Canvas ──
(function initHexCanvas() {
  const hc = document.getElementById('hexCanvas');
  function draw() {
    hc.width  = window.innerWidth;
    hc.height = window.innerHeight;
    const ctx = hc.getContext('2d');
    const S   = 44; // circumradius, flat-top
    const colW = S * 1.5;
    const rowH = S * Math.sqrt(3);
    const cols = Math.ceil(hc.width  / colW) + 3;
    const rows = Math.ceil(hc.height / rowH) + 3;
    ctx.strokeStyle = 'rgba(0, 200, 255, 1)'; // opacity controlled by CSS
    ctx.lineWidth   = 0.7;
    for (let col = -1; col < cols; col++) {
      for (let row = -1; row < rows; row++) {
        const cx = col * colW;
        const cy = row * rowH + (col % 2 !== 0 ? rowH / 2 : 0);
        ctx.beginPath();
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI / 3) * i;
          const x = cx + S * Math.cos(angle);
          const y = cy + S * Math.sin(angle);
          i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        }
        ctx.closePath();
        ctx.stroke();
      }
    }
  }
  draw();
  window.addEventListener('resize', draw);
})();

// ── Center lat/lon readout (updated in render loop) ──
const _frontPt = new THREE.Vector3();

// ═══════════════════════════════════════════════════
//  RENDER LOOP
// ═══════════════════════════════════════════════════
const clock = new THREE.Clock();

(function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (isDragging) {
    // rotation applied directly in mousemove/touchmove
  } else {
    // Apply velocity with momentum decay
    G.rotation.y += velY;
    G.rotation.x += velX;
    G.rotation.x = Math.max(-Math.PI/2.8, Math.min(Math.PI/2.8, G.rotation.x));
    velX *= DECAY;
    velY *= DECAY;

    // Resume gentle auto-rotate once momentum fades
    if (Math.abs(velX) < RESUME && Math.abs(velY) < RESUME) {
      G.rotation.y += AUTO_SPD;
    }
  }

  // Atmosphere breathing — slow, independent pulses per layer
  atmoRim.material.opacity   = 0.022 + 0.008 * Math.sin(t * 0.55);   // face haze — near-zero
  atmoInner.material.opacity = 0.170 + 0.050 * Math.sin(t * 0.42 + 1.1); // rim breathing
  atmoMid.material.opacity   = 0.115 + 0.030 * Math.sin(t * 0.31 + 2.3); // mid corona

  // Scan sweep — independent of globe rotation
  scanLine.rotation.y = t * 0.22;
  scanHalo.rotation.y = t * 0.22;
  // Ambient scan — subtle, boosts briefly when a city is selected
  const scanBase = selIdx >= 0 ? 0.32 : 0.18;
  scanLine.material.opacity = scanBase + 0.08 * Math.sin(t * 1.8);
  scanHalo.material.opacity = 0.06 + 0.03 * Math.sin(t * 1.4);

  // Pulse rings
  ringData.forEach(rd => {
    const s = 1 + 0.55 * Math.sin(t * 1.5 + rd.offset);
    rd.mesh.scale.setScalar(s);
    rd.mesh.material.opacity = 0.25 * (1 - (s-1)/0.55);
  });

  // Subtle pin float + selected pin grow/glow pulse
  pinMeshes.forEach((pin, i) => {
    const rd  = ringData[i];
    const bob = Math.sin(t * 1.5 + rd.offset) * 0.01;
    pin.position.copy(rd.basePos.clone().add(rd.dir.clone().multiplyScalar(0.05 + bob)));
    if (i === selIdx) {
      const pulse = 1.9 + 0.25 * Math.sin(t * 2.5);
      pin.scale.setScalar(pulse);
      pin.material.emissiveIntensity = 5.5 + 1.8 * Math.sin(t * 2.5);
    }
  });

  // Arc draw-in + particle animation
  activeArcs.forEach(arc => {
    // 1 — Draw the line progressively (0 → 1 over ~0.9s)
    if (arc.drawProgress < 1) {
      arc.drawProgress = Math.min(1, arc.drawProgress + 0.015);
      arc.lineMesh.geometry.setDrawRange(0, Math.floor(arc.drawProgress * (ARC_PTS + 1)));
    }
    // 2 — Particle travels once arc is at least 30% drawn
    if (arc.drawProgress >= 0.3) {
      arc.progress += arc.speed;
      if (arc.progress > 1) arc.progress = 0;
      const pt = arc.curve.getPoint(arc.progress);
      arc.dot.position.copy(pt);
      const fade = Math.sin(arc.progress * Math.PI) * arc.drawProgress;
      arc.dot.material.opacity = 0.92 * fade;
      const trailP = Math.max(0, arc.progress - 0.045);
      arc.trail.position.copy(arc.curve.getPoint(trailP));
      arc.trail.material.opacity = 0.38 * fade;
    }
  });

  // City scan rings — expand outward and fade
  for (let i = cityRings.length - 1; i >= 0; i--) {
    const cr = cityRings[i];
    cr.age += 0.016;
    if (cr.age < cr.delay) continue;
    const p = Math.min(1, (cr.age - cr.delay) / 1.1);
    if (p >= 1) {
      G.remove(cr.mesh);
      cr.mesh.geometry.dispose(); cr.mesh.material.dispose();
      cityRings.splice(i, 1); continue;
    }
    cr.mesh.scale.setScalar(1 + p * 7); // refined: expands 7x rather than 22x
    cr.mesh.material.opacity = 0.38 * (1 - p * p); // quadratic fade — holds longer then drops
  }

  // Update live lat/lon in header (glitch-aware)
  _frontPt.set(0, 0, GLOBE_R);
  const localFront = G.worldToLocal(_frontPt.clone()).normalize();
  const _lat = Math.asin(Math.max(-1, Math.min(1, localFront.y))) * 180 / Math.PI;
  let   _theta = Math.atan2(localFront.z, -localFront.x);
  if (_theta < 0) _theta += 2 * Math.PI;
  const _lon = _theta * 180 / Math.PI - 180;
  _latReal = _lat >= 0 ? `${_lat.toFixed(1)}° N` : `${Math.abs(_lat).toFixed(1)}° S`;
  _lonReal = _lon >= 0 ? `${_lon.toFixed(1)}° E` : `${Math.abs(_lon).toFixed(1)}° W`;
  if (!_glitching) {
    document.getElementById('hLat').textContent = _latReal;
    document.getElementById('hLon').textContent = _lonReal;
  }

  // Update targeting reticle — selected city takes priority over hover
  const _reticleIdx = selIdx >= 0 ? selIdx : hoverIdx;
  if (_reticleIdx >= 0) {
    hitMeshes[_reticleIdx].getWorldPosition(_rVec);
    _rVec.project(camera);
    const rx = (_rVec.x + 1) / 2 * window.innerWidth;
    const ry = -(_rVec.y - 1) / 2 * window.innerHeight;
    reticleEl.style.left = rx + 'px';
    reticleEl.style.top  = ry + 'px';
    if (selIdx >= 0) {
      reticleEl.className = 'selected';
      document.getElementById('reticleLabel').textContent = CITIES[selIdx].name;
    } else {
      reticleEl.className = 'show';
      document.getElementById('reticleLabel').textContent = '';
    }
  } else {
    reticleEl.className = '';
  }

  renderer.render(scene, camera);
})();
</script>
